<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información de Envío - Dunaka</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/direccion.css') }}">
</head>
<body>

    <header class="navbar-custom d-flex justify-content-between align-items-center">
        <a href="#" class="navbar-brand-custom"><i class="bi bi-box-seam me-2"></i>Dunaka</a>
        <a href="{{ url_for('cart.ver_carrito') }}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
            <i class="bi bi-arrow-left me-1"></i> Volver al carrito
        </a>
    </header>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                
                <div class="glass-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-light rounded-circle mb-3" style="width: 60px; height: 60px; color: var(--primary-color);">
                            <i class="bi bi-geo-alt fs-3"></i>
                        </div>
                        <h4 class="fw-bold text-dark">Información de Envío</h4>
                        <p class="text-muted small">Completa los datos exactos para realizar tu entrega</p>
                    </div>
                    
                    <form action="{{ url_for('cart.guardar_direccion_route') }}" method="POST">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Departamento</label>
                                <select id="departamento" name="departamento" class="form-select shadow-none" onchange="cargarMunicipios()" required>
                                    <option value="">Selecciona...</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Ciudad / Municipio</label>
                                <select id="ciudad" name="ciudad" class="form-select shadow-none" required>
                                    <option value="">Selecciona el depto</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium">Barrio</label>
                            <input type="text" name="barrio" class="form-control shadow-none" placeholder="Ej: Centro, El Bosque, etc." required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">Dirección detallada</label>
                            <input type="text" name="direccion" class="form-control shadow-none" placeholder="Calle, Carrera, número, apto" required>
                        </div>

                        <button type="submit" class="btn btn-gradient w-100 py-3 text-white border-0 shadow-sm fw-semibold">
                            Guardar y continuar al pago <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                        
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/direccion.js') }}"></script>
</body>
</html>
