<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Mi Perfil - Dunaka</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        /* =========================================
           VARIABLES Y CONFIGURACIÓN BASE
        ========================================= */
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #7c3aed;
            --gradient-main: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            --bg-app: #f4f7fe;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            --shadow-md: 0 10px 30px -5px rgba(79, 70, 229, 0.1);
            --shadow-hover: 0 20px 40px -10px rgba(79, 70, 229, 0.2);
            --radius-lg: 24px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        /* =========================================
           NAVBAR
        ========================================= */
        .custom-navbar {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        /* =========================================
           TARJETAS Y FORMULARIOS
        ========================================= */
        .glass-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: var(--shadow-md);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-input {
            border-radius: 14px;
            padding: 12px 18px;
            border: 2px solid var(--border-color);
            background-color: #f8fafc;
            color: var(--text-dark);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .custom-input:focus {
            background-color: #ffffff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }

        .form-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        /* =========================================
           AVATAR UPLOAD
        ========================================= */
        .avatar-upload-container {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(79, 70, 229, 0.03);
            border-radius: 16px;
            border: 1px dashed var(--primary-color);
            margin-bottom: 30px;
        }

        .preview-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
        }

        /* =========================================
           BOTONES
        ========================================= */
        .btn-gradient {
            background: var(--gradient-main);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            width: 100%;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
            color: white;
        }

        .btn-outline-custom {
            border: 2px solid var(--border-color);
            color: var(--text-muted);
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s;
            background: transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .btn-outline-custom:hover {
            border-color: var(--text-dark);
            color: var(--text-dark);
            background: rgba(0, 0, 0, 0.02);
        }

        /* Animación de entrada */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top custom-navbar py-3">
        <div class="container">
            <a class="navbar-brand brand-title fs-3 m-0" href="{{ url_for('products.index') }}">Dunaka</a>
            <div class="ms-auto d-flex gap-3 align-items-center">
                <a href="{{ url_for('profile.ver_perfil') }}" class="text-dark text-decoration-none fw-medium">
                    <i class="bi bi-x-lg me-1"></i> Cancelar
                </a>
            </div>
        </div>
    </nav>

    <main class="container mb-5" style="margin-top: 120px;">
        <div class="row justify-content-center fade-in-up">
            <div class="col-lg-8 col-xl-7">
                
                <div class="glass-card p-4 p-md-5">
                    <div class="text-center mb-5">
                        <h3 class="fw-bold text-dark mb-2">Modificar Datos Personales</h3>
                        <p class="text-muted">Actualiza tu información de contacto y preferencias de entrega.</p>
                    </div>

                    <form action="{{ url_for('profile.editar_perfil') }}" method="POST" enctype="multipart/form-data">
                        
                        <div class="avatar-upload-container">
                            <img src="{{ usuario.foto_perfil_url or 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80' }}" class="preview-avatar" alt="Tu avatar">
                            <div class="flex-grow-1 w-100">
                                <label class="form-label">Foto de Perfil</label>
                                <input class="form-control custom-input" type="file" name="foto_perfil" accept="image/*" style="padding: 9px 15px;">
                            </div>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 text-muted ps-3 custom-input" style="border-radius: 14px 0 0 14px;"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control custom-input border-start-0 ps-0" id="nombre" name="nombre" value="{{ usuario.nombre }}" required>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="correo" class="form-label">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 text-muted ps-3 custom-input" style="border-radius: 14px 0 0 14px;"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control custom-input border-start-0 ps-0" id="correo" name="correo" value="{{ usuario.correo }}" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="telefono" class="form-label">Teléfono / Celular</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 text-muted ps-3 custom-input" style="border-radius: 14px 0 0 14px;"><i class="bi bi-telephone"></i></span>
                                    <input type="text" class="form-control custom-input border-start-0 ps-0" id="telefono" name="telefono" value="{{ usuario.telefono or '' }}" placeholder="Ej: 3001234567">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="ciudad" class="form-label">Ciudad / Municipio</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 text-muted ps-3 custom-input" style="border-radius: 14px 0 0 14px;"><i class="bi bi-building"></i></span>
                                    <input type="text" class="form-control custom-input border-start-0 ps-0" id="ciudad" name="ciudad" value="{{ usuario.ciudad or '' }}" placeholder="Ej: Barranquilla">
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="direccion" class="form-label">Dirección de Envío Completa</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 text-muted ps-3 custom-input" style="border-radius: 14px 0 0 14px;"><i class="bi bi-geo-alt"></i></span>
                                    <input type="text" class="form-control custom-input border-start-0 ps-0" id="direccion" name="direccion" value="{{ usuario.direccion or '' }}" placeholder="Calle, Carrera, Barrio, N° de apto">
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mt-2">
                            <div class="col-md-6 order-2 order-md-1">
                                <a href="{{ url_for('profile.ver_perfil') }}" class="btn-outline-custom">
                                    <i class="bi bi-arrow-left me-2"></i> Volver sin cambios
                                </a>
                            </div>
                            <div class="col-md-6 order-1 order-md-2">
                                <button type="submit" class="btn-gradient">
                                    <i class="bi bi-check2-circle me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </div>

                    </form>
                </div>
                
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
