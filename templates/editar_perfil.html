<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Mi Perfil - Dunaka</title>
    <style>
        .perfil-container { max-width: 600px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: sans-serif; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 6px; }
        label { font-weight: bold; color: #555; font-size: 14px; text-transform: uppercase; }
        input[type="text"], input[type="email"], input[type="file"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
        .btn-guardar { width: 100%; padding: 12px; background: #1e2522; color: #fff; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn-guardar:hover { background: #2c3531; }
        .btn-cancelar { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
        .btn-cancelar:hover { text-decoration: underline; }
        .preview-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid #ddd; }
    </style>
</head>
<body>

    <div class="perfil-container">
        <h2>Modificar Datos Personales</h2>
        <p style="color: #666; margin-bottom: 25px;">Actualiza tu información de contacto y entrega a continuación.</p>

        <form action="{{ url_for('profile.editar_perfil') }}" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>Foto de Perfil Actual</label>
                <img src="{{ usuario.foto_perfil_url or 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80' }}" class="preview-avatar" alt="Miniatura">
                <input type="file" name="foto_perfil" accept="image/*">
            </div>

            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" value="{{ usuario.nombre }}" required>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" value="{{ usuario.correo }}" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono / Celular</label>
                <input type="text" id="telefono" name="telefono" value="{{ usuario.telefono or '' }}" placeholder="Ej: 3001234567">
            </div>

            <div class="form-group">
                <label for="direccion">Dirección de Envío</label>
                <input type="text" id="direccion" name="direccion" value="{{ usuario.direccion or '' }}" placeholder="Calle, Carrera, Barrio, N° de apto">
            </div>

            <div class="form-group">
                <label for="ciudad">Ciudad / Municipio</label>
                <input type="text" id="ciudad" name="ciudad" value="{{ usuario.ciudad or '' }}" placeholder="Ej: Barranquilla">
            </div>

            <button type="submit" class="btn-guardar">Guardar Cambios</button>
            
            <a href="{{ url_for('profile.ver_perfil') }}" class="btn-cancelar">Volver sin modificar</a>
        </form>
    </div>

</body>
</html>
