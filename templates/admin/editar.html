<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunaka Admin - Editar Bolso</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --verde-artesanal: #7fa99b;
            --verde-claro: #f1f7f4;
            --verde-oscuro: #3f5e53;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--verde-claro);
        }
        .card-custom { border: none; border-radius: 20px;}
        .form-control:focus {
            border-color: var(--verde-artesanal);
            box-shadow: 0 0 0 0.25rem rgba(127, 169, 155, 0.25);
        }
        .btn-update {
            background-color: #e0a96d; /* Tono ocre complementario para edición */
            color: white;
            border: none;
            border-radius: 30px;
        }
        .btn-update:hover { background-color: #c08b51; color: white; }
        .preview-box {
            width: 100%; height: 180px; background-color: #e9ecef;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; overflow: hidden; border: 2px dashed #ccc;
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card card-custom shadow p-4">
                    <h3 class="mb-4 text-center" style="font-family: 'Playfair Display', serif; color: var(--verde-oscuro);">Actualizar Detalle de Bolso</h3>
                    
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-7">
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Nombre de la pieza</label>
                                    <input type="text" name="nombre" class="form-control form-control-lg" value="{{ producto.nombre }}" required>
                                </div>
                                <div class="row mb-3">
                                    <div class="col">
                                        <label class="form-label small fw-medium">Costo Compra ($)</label>
                                        <input type="number" step="0.01" name="precio_compra" class="form-control" value="{{ producto.precio_compra }}" required>
                                    </div>
                                    <div class="col">
                                        <label class="form-label small fw-medium">Precio Venta ($)</label>
                                        <input type="number" step="0.01" name="precio_venta" class="form-control" value="{{ producto.precio_venta }}" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col">
                                        <label class="form-label small fw-medium">Stock Actual</label>
                                        <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required>
                                    </div>
                                    <div class="col">
                                        <label class="form-label small fw-medium">Stock Mínimo</label>
                                        <input type="number" name="stock_minimo" class="form-control" value="{{ producto.stock_minimo }}" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-5 d-flex flex-column justify-content-between">
                                <div class="mb-3">
                                    <label class="form-label fw-medium">URL de Imagen</label>
                                    <input type="url" name="imagen_url" id="img_input" class="form-control" value="{{ producto.imagen_url or '' }}">
                                </div>
                                <div class="mb-3">
                                    <span class="d-block small mb-2 fw-medium text-muted">Previsualización:</span>
                                    <div class="preview-box">
                                        <img id="img_preview" src="{{ producto.imagen_url or '' }}" style="width:100%; height:100%; object-fit:cover; {% if producto.imagen_url %} display:block; {% else %} display:none; {% endif %}">
                                        <span id="preview_text" class="text-muted small text-center px-2" style="{% if producto.imagen_url %} display:none; {% endif %}">Sin imagen asignada</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3 mt-3">
                            <label class="form-label fw-medium">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="3">{{ producto.descripcion or '' }}</textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-light rounded-pill px-4">Volver</a>
                            <button type="submit" class="btn btn-update px-5 py-2">Modificar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imgInput = document.getElementById('img_input');
        const imgPreview = document.getElementById('img_preview');
        const previewText = document.getElementById('preview_text');

        imgInput.addEventListener('input', function() {
            if (this.value.trim() !== "") {
                imgPreview.src = this.value;
                imgPreview.style.display = 'block';
                previewText.style.display = 'none';
            } else {
                imgPreview.style.display = 'none';
                previewText.style.display = 'block';
            }
        });
    </script>
</body>
</html>
