<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunaka Admin - Editar Bolso</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editar.css') }}">
</head>
<body>

    <main class="container py-5" style="max-width: 900px;">
        
        <!-- HEADER DE LA PÁGINA -->
        <div class="mb-5 text-center text-md-start">
            <h1 class="page-title">Actualizar Pieza</h1>
            <p class="page-subtitle">Modifica los detalles, inventario y precios de este bolso.</p>
        </div>

        <div class="dunaka-card">
            <!-- NOTA: Añadimos enctype="multipart/form-data" para permitir subida de archivos -->
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-4">
                    
                    <!-- COLUMNA IZQUIERDA: Datos del Bolso -->
                    <div class="col-md-7">
                        <div class="mb-4">
                            <label class="form-label">Nombre de la pieza</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0" style="border-radius: var(--radius-input) 0 0 var(--radius-input); border-color: var(--border-color);">
                                    <i class="bi bi-bag text-muted"></i>
                                </span>
                                <input type="text" name="nombre" class="form-control border-start-0 ps-0" value="{{ producto.nombre }}" required style="border-radius: 0 var(--radius-input) var(--radius-input) 0;">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-sm-6">
                                <label class="form-label">Costo Compra</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0" style="border-radius: var(--radius-input) 0 0 var(--radius-input); border-color: var(--border-color);">$</span>
                                    <!-- NOTA: Se añadió min="0" -->
                                    <input type="number" step="0.01" min="0" name="precio_compra" class="form-control border-start-0 ps-0" value="{{ producto.precio_compra }}" required style="border-radius: 0 var(--radius-input) var(--radius-input) 0;">
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label text-primary">Precio Venta</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0" style="border-radius: var(--radius-input) 0 0 var(--radius-input); border-color: var(--border-color);">$</span>
                                    <!-- NOTA: Se añadió min="0" -->
                                    <input type="number" step="0.01" min="0" name="precio_venta" class="form-control border-start-0 ps-0" value="{{ producto.precio_venta }}" required style="border-radius: 0 var(--radius-input) var(--radius-input) 0;">
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-sm-6">
                                <label class="form-label">Stock Actual</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0" style="border-radius: var(--radius-input) 0 0 var(--radius-input); border-color: var(--border-color);">
                                        <i class="bi bi-box-seam text-muted"></i>
                                    </span>
                                    <!-- NOTA: Se añadió min="0" -->
                                    <input type="number" min="0" name="stock" class="form-control border-start-0 ps-0" value="{{ producto.stock }}" required style="border-radius: 0 var(--radius-input) var(--radius-input) 0;">
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label">Stock Mínimo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0" style="border-radius: var(--radius-input) 0 0 var(--radius-input); border-color: var(--border-color);">
                                        <i class="bi bi-exclamation-triangle text-muted"></i>
                                    </span>
                                    <!-- NOTA: Se añadió min="0" -->
                                    <input type="number" min="0" name="stock_minimo" class="form-control border-start-0 ps-0" value="{{ producto.stock_minimo }}" required style="border-radius: 0 var(--radius-input) var(--radius-input) 0;">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- COLUMNA DERECHA: Imagen -->
                    <div class="col-md-5 d-flex flex-column">
                        <div class="mb-3">
                            <label class="form-label">Subir nueva imagen</label>
                            <!-- NOTA: Cambiado type="url" a type="file" y se añadió accept="image/*" -->
                            <input type="file" name="imagen_archivo" id="img_input" class="form-control" accept="image/*">
                        </div>
                        <div class="flex-grow-1 d-flex flex-column">
                            <span class="form-label mb-2">Previsualización</span>
                            <div class="preview-box">
                                <img id="img_preview" src="{{ producto.imagen_url or '' }}" style="width:100%; height:100%; object-fit:cover; {% if producto.imagen_url %} display:block; {% else %} display:none; {% endif %}">
                                <div id="preview_text" class="text-center" style="{% if producto.imagen_url %} display:none; {% endif %}">
                                    <i class="bi bi-image text-muted fs-1 mb-2 d-block"></i>
                                    <span class="text-muted small px-2">Selecciona un archivo para ver la imagen</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FILA INFERIOR: Descripción y Botones -->
                <div class="row mt-2">
                    <div class="col-12 mb-4">
                        <label class="form-label">Descripción del producto</label>
                        <textarea name="descripcion" class="form-control" rows="3" placeholder="Añade detalles sobre el material, origen, colores...">{{ producto.descripcion or '' }}</textarea>
                    </div>
                </div>

                <hr class="border-light my-4">

                <div class="d-flex flex-column flex-sm-row justify-content-end gap-3">
                    <a href="{{ url_for('admin.panel_admin') }}" class="btn btn-action-light justify-content-center">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-dunaka-primary justify-content-center">
                        <i class="bi bi-check2-circle"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const imgInput = document.getElementById('img_input');
        const imgPreview = document.getElementById('img_preview');
        const previewText = document.getElementById('preview_text');
        
        // Guardamos la imagen original en caso de que cancelen la selección
        const originalSrc = imgPreview.src;
        const hasOriginal = "{{ producto.imagen_url }}" !== "" && "{{ producto.imagen_url }}" !== "None";

        imgInput.addEventListener('change', function(event) {
            // Obtenemos el archivo seleccionado
            const file = event.target.files[0];
            
            if (file) {
                // Si hay archivo, creamos una URL local para previsualizarlo
                imgPreview.src = URL.createObjectURL(file);
                imgPreview.style.display = 'block';
                previewText.style.display = 'none';
            } else {
                // Si cancelan la selección, volvemos al estado anterior
                if (hasOriginal) {
                    imgPreview.src = originalSrc;
                    imgPreview.style.display = 'block';
                    previewText.style.display = 'none';
                } else {
                    imgPreview.style.display = 'none';
                    previewText.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
