<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dunaka | Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/notificaciones.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    
</head>
<body>
    <div class="sidebar-container">
        <div class="sidebar-brand">
            <h3>Dunaka</h3>
            <span>Panel de Gestión</span>
        </div>
        <ul class="sidebar-menu">
            <li class="menu-item"><a href="{{ url_for('admin.panel_admin') }}" class="menu-link"><div class="menu-icon-wrapper"><i class="fas fa-box"></i></div>Gestión de Productos</a></li>
            <li class="menu-item"><a href="{{ url_for('admin.gestion_usuarios') }}" class="menu-link"><div class="menu-icon-wrapper"><i class="fas fa-users"></i></div>Gestión de Usuarios</a></li>
            <li class="menu-item"><a href="{{ url_for('admin.ver_notificaciones') }}" class="menu-link"><div class="menu-icon-wrapper"><i class="fas fa-bell"></i></div>Notificaciones</a></li>
            <li class="menu-item"><a href="{{ url_for('admin.ver_reportes') }}" class="menu-link"><div class="menu-icon-wrapper"><i class="fas fa-chart-bar"></i></div>Reportes</a></li>
            <li class="menu-item"><a href="{{ url_for('support.admin_soporte_panel') }}" class="menu-link"><div class="menu-icon-wrapper"><i class="fas fa-headset"></i></div>Mensajes Soporte</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="{{ url_for('auth.logout') }}" class="menu-link logout-link"><div class="menu-icon-wrapper"><i class="fas fa-sign-out-alt"></i></div>Cerrar Sesión</a>
        </div>
    </div>

    <div class="main-workspace">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
