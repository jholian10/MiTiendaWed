<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunaka Admin - Registrar Bolso</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --verde-artesanal: #7fa99b;
            --verde-claro: #f1f7f4;
            --verde-oscuro: #3f5e53;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--verde-claro);
        }
        .card-custom {
            border: none;
            border-radius: 20px;
        }
        .form-control:focus {
            border-color: var(--verde-artesanal);
            box-shadow: 0 0 0 0.25rem rgba(127, 169, 155, 0.25);
        }
        .btn-save {
            background-color: var(--verde-artesanal);
            color: white;
            border: none;
            border-radius: 30px;
        }
        .btn-save:hover { background-color: var(--verde-oscuro); color: white;}
        .preview-box {
            width: 100%;
            height: 180px;
            background-color: #e9ecef;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed #ccc;
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card card-custom shadow p-4">
                    <h3 class="mb-4 text-center" style="font-family: 'Playfair Display', serif; color: var(--verde-oscuro);">Diseñar Nuevo Bolso</h3>
                    
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-7">
                                <div class="mb-3">
                                    <label class="form-label fw-medium">Nombre del Bolso</label>
                                    <input type="text" name="nombre" class="form-control form-control-lg" placeholder="Ej. Bolso Totumo Tejido" required maxlength="120">
                                </div>
                                <div class="row mb-3">
                                    <div class="col">
                                        <label class="form-label small fw-medium">Costo Compra ($)</label>
                                        <input type="number" step="0.01" name="precio_compra" class="form-control" placeholder="0.00" required>
                                    </div>
                                    <div class="col">
                                        <label class="form-label small fw-medium">Precio Venta ($)</label>
                                        <input type="number" step="0.01" name="precio_venta" class="form-control" placeholder="0.00" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col">
                                        <label class="form-label small fw-medium">Stock Inicial</label>
                                        <input type="number" name="stock" class="form-control" value="0" required>
                                    </div>
                                    <div class="col">
                                        <label class="form-label small fw-medium">Mínimo Alerta</label>
                                        <input type="number" name="stock_minimo" class="form-control" value="5" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-5 d-flex flex-column justify-content-between">
                                <div class="mb-3">
                                    <label class="form-label fw-medium">URL de Imagen</label>
                                    <input type="url" name="imagen_url" id="img_input" class="form-control" placeholder="https://..." maxlength="255">
                                </div>
                                <div class="mb-3">
                                    <span class="d-block small mb-2 fw-medium text-muted">Previsualización:</span>
                                    <div class="preview-box">
                                        <img id="img_preview" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                                        <span id="preview_text" class="text-muted small text-center px-2">Inserta una URL válida para ver el bolso</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3 mt-3">
                            <label class="form-label fw-medium">Descripción Artesanal (Detalles del tejido, materiales)</label>
                            <textarea name="descripcion" class="form-control" rows="3" placeholder="Describe el alma de esta pieza..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{{ url_for('admin.panel_admin') }}" class="btn btn-light rounded-pill px-4">Cancelar</a>
                            <button type="submit" class="btn btn-save px-5 py-2">Registrar Bolso</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imgInput = document.getElementById('img_input');
        const imgPreview = document.getElementById('img_preview');
        const previewText = document.getElementById('preview_text');

        imgInput.addEventListener('input', function() {
            if (this.value.trim() !== "") {
                imgPreview.src = this.value;
                imgPreview.style.display = 'block';
                previewText.style.display = 'none';
            } else {
                imgPreview.style.display = 'none';
                previewText.style.display = 'block';
            }
        });

        // Manejo si la imagen falla al cargar
        imgPreview.addEventListener('error', function() {
            imgPreview.style.display = 'none';
            previewText.style.display = 'block';
            previewText.innerText = "Error al cargar la imagen. Revisa la URL.";
        });
    </script>
</body>
</html>
