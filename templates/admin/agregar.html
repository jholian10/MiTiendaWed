<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dunaka | Registrar Bolso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/agregar.css') }}">
</head>
<body class="py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="main-card">
                <h3 class="fw-bold mb-4">Registrar Nuevo Bolso</h3>
                <form method="POST" action="{{ url_for('admin.nuevo_producto') }}" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-7">
                            <div class="mb-3"><label>Nombre</label><input type="text" name="nombre" class="form-control" required></div>
                            <div class="row">
                                <div class="col"><label>Costo Compra</label><input type="number" step="0.01" min="0" name="precio_compra" class="form-control" required></div>
                                <div class="col"><label>Precio Venta</label><input type="number" step="0.01" min="0" name="precio_venta" class="form-control" required></div>
                            </div>
                            <div class="row mt-2">
                                <div class="col"><label>Stock Inicial</label><input type="number" min="0" name="stock" class="form-control" value="0" required></div>
                                <div class="col"><label>Mínimo Alerta</label><input type="number" min="0" name="stock_minimo" class="form-control" value="5" required></div>
                            </div>
                            <div class="mt-3"><label>Descripción</label><textarea name="descripcion" class="form-control" rows="3"></textarea></div>
                        </div>
                        <div class="col-md-5">
                            <label class="fw-semibold">Imagen del Producto</label>
                            
                            <!-- Zona de arrastre/clic para archivo local -->
                            <div class="upload-zone mb-3" onclick="document.getElementById('file_input').click()">
                                <input type="file" name="imagen" id="file_input" accept="image/*" style="display: none;">
                                <img id="preview" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                                <div id="msg">Haz clic para subir archivo</div>
                            </div>

                            <!-- Nueva opción para ingresar URL de imagen -->
                            <div class="mb-3">
                                <label class="small text-secondary fw-semibold">O pegar URL de la imagen</label>
                                <input type="url" name="imagen_url" id="url_input" class="form-control" placeholder="https://ejemplo.com/imagen.jpg">
                            </div>
                        </div>
                    </div>
                    <div class="mt-4"><button type="submit" class="btn btn-save">Registrar Bolso</button></div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/agregar.js') }}"></script>

<!-- Script para la vista previa dinámica de la URL -->
<script>
    document.getElementById('url_input').addEventListener('input', function() {
        const preview = document.getElementById('preview');
        const msg = document.getElementById('msg');
        
        if (this.value.trim() !== "") {
            preview.src = this.value;
            preview.style.display = 'block';
            msg.style.display = 'none';
        } else {
            // Si el campo de URL se vacía y no hay un archivo seleccionado, se limpia la vista previa
            if (!document.getElementById('file_input').files.length) {
                preview.src = "";
                preview.style.display = 'none';
                msg.style.display = 'block';
            }
        }
    });
</script>
</body>
</html>
