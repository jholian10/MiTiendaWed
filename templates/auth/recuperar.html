<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3 class="text-center">Recuperar contraseña</h3>
                    <p class="text-muted text-center">Ingresa tu correo electrónico</p>
                    <form action="{{ url_for('auth.recuperar_password') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" name="correo" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar instrucciones</button>
                    </form>
                    <a href="{{ url_for('auth.login') }}" class="d-block text-center mt-3">Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
