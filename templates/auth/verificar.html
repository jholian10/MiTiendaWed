<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar Código</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3 class="text-center">Verificación</h3>
                    <p class="text-muted text-center">Ingresa el código enviado a tu correo</p>
                    
                    {% with messages = get_flashed_messages() %}
                      {% if messages %}
                        {% for message in messages %}
                          <div class="alert alert-info">{{ message }}</div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form action="{{ url_for('auth.verificar_codigo') }}" method="POST">
                        <div class="mb-3">
                            <input type="text" name="codigo" class="form-control" placeholder="6 dígitos" maxlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Validar código</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
