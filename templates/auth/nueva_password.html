<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3 class="text-center">Nueva contraseña</h3>
                    <p class="text-muted text-center">Escribe tu nueva clave de acceso</p>
                    <form action="{{ url_for('auth.reset_password_final') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Cambiar contraseña</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
