<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunaka - Crear Cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f7f4; height: 100vh; display: flex; align-items: center; }
        .register-card { border: none; border-radius: 24px; box-shadow: 0 10px 30px rgba(63, 94, 83, 0.1); }
        .brand-font { font-family: 'Playfair Display', serif; color: #3f5e53; }
        .btn-dunaka { background-color: #7fa99b; color: white; border-radius: 30px; border: none; padding: 10px; transition: 0.3s; }
        .btn-dunaka:hover { background-color: #3f5e53; color: white; }
        .form-control, .form-select { border-radius: 12px; border: 1px solid #e0e5e2; padding: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4 px-4">
                <div class="card register-card p-4">
                    <div class="text-center mb-4">
                        <h2 class="brand-font fs-1">Dunaka</h2>
                        <p class="text-muted small">Únete a nuestra comunidad artesanal</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} small py-2 rounded-3 text-center">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <div class="mb-3">
                            <label class="form-label small fw-medium">Nombre Completo</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Tu nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control" placeholder="nombre@dunaka.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-medium">Tipo de Perfil (Rol)</label>
                            <select name="rol" class="form-select">
                                <option value="cliente">Cliente Standard</option>
                                <option value="admin">Administrador del Taller</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-dunaka w-100 mb-3">Registrarse</button>
                        <div class="text-center">
                            <a href="{{ url_for('auth.login') }}" class="text-muted small text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
