<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunaka - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f7f4; height: 100vh; display: flex; align-items: center; }
        .login-card { border: none; border-radius: 24px; box-shadow: 0 10px 30px rgba(63, 94, 83, 0.1); }
        .brand-font { font-family: 'Playfair Display', serif; color: #3f5e53; }
        .btn-dunaka { background-color: #7fa99b; color: white; border-radius: 30px; border: none; padding: 10px; transition: 0.3s; }
        .btn-dunaka:hover { background-color: #3f5e53; color: white; }
        .form-control { border-radius: 12px; border: 1px solid #e0e5e2; padding: 12px; }
        .link-dunaka { color: #7fa99b; font-weight: 500; transition: 0.2s; }
        .link-dunaka:hover { color: #3f5e53; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4 px-4">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <h2 class="brand-font fs-1">Dunaka</h2>
                        <p class="text-muted small">Bienvenido a nuestro taller artesanal</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} small py-2 rounded-3 text-center" role="alert">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label class="form-label small fw-medium">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control" placeholder="nombre@dunaka.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-medium">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn btn-dunaka w-100 mb-3">Ingresar</button>
                        
                        <div class="text-center mt-3 border-top pt-3">
                            <p class="small text-muted mb-2">¿No tienes una cuenta?</p>
                            <a href="{{ url_for('auth.register') }}" class="text-decoration-none small link-dunaka">Crear una cuenta nueva</a>
                        </div>
                        
                        <div class="text-center mt-3">
                            <a href="{{ url_for('products.index') }}" class="text-muted small text-decoration-none">← Volver a la tienda</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
