<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunaka | Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f1f7f4 0%, #e8edea 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
        }
        .login-card { 
            border: none; 
            border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(63, 94, 83, 0.12); 
            background: #ffffff;
            padding: 2.5rem;
        }
        .brand-font { font-family: 'Playfair Display', serif; color: #1e2522; }
        .form-control { 
            border-radius: 14px; 
            border: 1.5px solid #e0e5e2; 
            padding: 14px;
            transition: all 0.3s;
        }
        .form-control:focus { border-color: #7fa99b; box-shadow: 0 0 0 4px rgba(127, 169, 155, 0.1); }
        .btn-dunaka { 
            background-color: #1e2522; 
            color: white; 
            border-radius: 14px; 
            padding: 14px; 
            font-weight: 500;
            transition: 0.3s; 
        }
        .btn-dunaka:hover { background-color: #3f5e53; color: white; }
        .btn-google { 
            background: white; 
            border: 1.5px solid #dadce0; 
            border-radius: 14px; 
            padding: 12px; 
            transition: 0.3s; 
            color: #3c4043;
        }
        .btn-google:hover { background: #f8f9fa; border-color: #bcc1c6; }
        .link-dunaka { color: #7fa99b; font-weight: 600; text-decoration: none; }
        .link-dunaka:hover { color: #3f5e53; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card">
                    <div class="text-center mb-4">
                        <h2 class="brand-font fs-1 mb-1">Dunaka</h2>
                        <p class="text-muted">Bienvenido a nuestro taller</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} small rounded-3 text-center" role="alert">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control" placeholder="nombre@ejemplo.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn btn-dunaka w-100 mb-3">Iniciar Sesión</button>
                    </form>

                    <div class="text-center mb-3">
                        <span class="text-muted small">o continuar con</span>
                    </div>

                    <a href="{{ url_for('auth.google_login') }}" class="btn btn-google w-100 mb-4 d-flex align-items-center justify-content-center">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" class="me-2">
                        Google
                    </a>
                    
                    <div class="text-center border-top pt-3">
                        <p class="small text-muted mb-1">¿No tienes cuenta? <a href="{{ url_for('auth.register') }}" class="link-dunaka">Regístrate</a></p>
                        <a href="{{ url_for('products.index') }}" class="small text-secondary">← Volver a la tienda</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
