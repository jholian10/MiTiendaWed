<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soporte Técnico</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/support.css') }}"
    />
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <img
          src="https://api.dicebear.com/7.x/bottts/svg?seed=Support"
          class="avatar"
        />
        <div>
          <h5 style="margin: 0">Soporte Dunaka</h5>
          <small>Hola, {{ nombre_usuario }}</small>
        </div>
      </div>

      <div id="chat-messages" class="chat-body">
        <div class="message bot">
          ¡Hola, {{ nombre_usuario }}! 👋 ¿En qué podemos ayudarte hoy?
        </div>
        {% for m in mensajes %}
        <div
          class="message {{ 'user' if m.remitente == 'cliente' else 'bot' }}"
        >
          {{ m.mensaje }}
        </div>
        {% endfor %}
      </div>

      <div class="chat-footer">
        <input
          type="text"
          id="user-input"
          placeholder="Escribe tu mensaje..."
          onkeydown="if(event.key === 'Enter') sendMessage()"
        />
        <button onclick="sendMessage()"><i class="bi bi-send-fill"></i></button>
      </div>
    </div>

    <!-- Se añade la librería cliente de Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
    // 1. Inicialización de constantes y socket
    const socket = io();
    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input'); // Asegúrate que tu input tenga este ID
    const statusElement = document.getElementById('statusElement'); // Asegúrate que tu elemento de texto tenga este ID
    const miUsuarioId = "{{ session.get('usuario', {}).get('id') }}";

    // 2. Auto-scroll al fondo al cargar el chat
    chatMessages.scrollTop = chatMessages.scrollHeight;

    // 3. Lógica de envío de mensajes
    function sendMessage() {
        const mensaje = userInput.value.trim();
        if (mensaje === "") return;

        // Mostrar en pantalla al instante
        const miMensajeDiv = document.createElement('div');
        miMensajeDiv.className = 'message user';
        miMensajeDiv.textContent = mensaje;
        chatMessages.appendChild(miMensajeDiv);
        
        userInput.value = '';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Guardar en BD y avisar por socket
        fetch('/support/api', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ mensaje: mensaje })
        })
        .then(res => {
            if(res.ok) {
                socket.emit('aviso_mensaje_cliente', {
                    usuario_id: miUsuarioId,
                    mensaje: mensaje
                });
            }
        });
    }

    // 4. Detectar cuando el cliente escribe
    userInput.addEventListener('input', () => {
        socket.emit('escribiendo', { 
            usuario_id: miUsuarioId, 
            quien: 'cliente' 
        });
    });

    // 5. Escuchar cuando el admin está escribiendo
    socket.on('admin_escribiendo', (data) => {
        if (statusElement) {
            statusElement.innerText = 'El administrador está escribiendo...';
            
            clearTimeout(window.typingTimer);
            window.typingTimer = setTimeout(() => {
                statusElement.innerText = 'En línea';
            }, 3000);
        }
    });

    // 6. Escuchar respuestas en vivo del administrador
    socket.on('recibir_mensaje_cliente', function(data) {
        if (String(data.usuario_id) === String(miUsuarioId) && data.remitente === 'admin') {
            const mensajeAdminDiv = document.createElement('div');
            mensajeAdminDiv.className = 'message bot';
            mensajeAdminDiv.textContent = data.mensaje;
            chatMessages.appendChild(mensajeAdminDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    });
</script>
  </body>
</html>
