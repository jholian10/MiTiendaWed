<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunaka - Mis Favoritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fafbfb; }
        .brand-title { font-family: 'Playfair Display', serif; color: #3f5e53; }
        .fav-card { border: none; border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .fav-card:hover { transform: translateY(-5px); }
        .btn-remove { position: absolute; top: 10px; right: 10px; background: white; border: none; border-radius: 50%; width: 32px; height: 32px; color: #e65c5c; display: flex; align-items: center; justify-content: center; }
        .img-placeholder-client { height: 200px; background-color: #f5f7f6; color: #9eb2a8; font-family: 'Playfair Display', serif; font-style: italic; }
    </style>
</head>
<body>
    <nav class="navbar border-bottom bg-white py-3">
        <div class="container">
            <a class="brand-title fs-3 text-decoration-none" href="{{ url_for('products.index') }}">Dunaka</a>
            <span class="text-muted">Mis Favoritos</span>
        </div>
    </nav>
    <main class="container my-5">
        <div class="row g-4" id="fav-container">
            {% for p in productos %}
            <div class="col-6 col-md-3 product-item" id="product-card-{{ p.id }}">
                <div class="card fav-card shadow-sm position-relative h-100">
                    <button class="btn-remove shadow-sm" onclick="removerFavorito(this, '{{ p.id }}')">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    {% if p.imagen_url %}
                        <img src="{{ p.imagen_url }}" class="card-img-top" style="height: 200px; object-fit: cover;" alt="{{ p.nombre }}">
                    {% else %}
                        <div class="d-flex align-items-center justify-content-center img-placeholder-client fs-5 text-center px-2">
                            Dunaka Taller
                        </div>
                    {% endif %}
                    <div class="card-body p-3 text-center d-flex flex-column justify-content-between">
                        <h6 class="fw-bold mb-1 text-truncate">{{ p.nombre }}</h6>
                        <span class="text-success fw-bold">${{ p.precio_venta }}</span>
                    </div>
                </div>
            </div>
            {% endfor %}
            
            <div class="col-12 text-center py-5 {% if productos %}d-none{% endif %}" id="empty-msg">
                <i class="bi bi-heartbreak text-muted display-4"></i>
                <p class="text-muted mt-3">Aún no has guardado ninguna pieza en favoritos.</p>
                <a href="{{ url_for('products.index') }}" class="btn btn-sm btn-outline-secondary rounded-pill px-4 mt-2">Explorar tienda</a>
            </div>
        </div>
    </main>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage"></div>
                <button type="button" class="btn-close btn-close-white m-auto me-2" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toastElement = document.getElementById('liveToast');
        const toast = new bootstrap.Toast(toastElement);

        function mostrarNotificacion(mensaje, tipo = 'success') {
            const bgClass = tipo === 'success' ? 'bg-success' : (tipo === 'warning' ? 'bg-warning text-dark' : 'bg-danger');
            toastElement.className = `toast align-items-center text-white border-0 ${bgClass}`;
            document.getElementById('toastMessage').innerText = mensaje;
            toast.show();
        }

        async function removerFavorito(button, productoId) {
            try {
                const response = await fetch(`/favoritos/toggle/${productoId}`, {
                    method: 'POST',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!data.agregado) {
                        // Eliminar elemento de la interfaz de forma limpia
                        const elemento = document.getElementById(`product-card-${productoId}`);
                        elemento.remove();
                        mostrarNotificacion(data.message, "success");

                        // Si ya no quedan tarjetas visibles, mostrar el mensaje de favoritos vacíos
                        const restantes = document.querySelectorAll('.product-item');
                        if (restantes.length === 0) {
                            document.getElementById('empty-msg').classList.remove('d-none');
                        }
                    }
                }
            } catch (error) {
                mostrarNotificacion("Error al intentar actualizar tus favoritos.", "danger");
            }
        }
    </script>
</body>
</html>
